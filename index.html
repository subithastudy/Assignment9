<!DOCTYPE html>
<html lang="en">

<!-- Head starts -->
<head>

    <meta charset="UTF-8">
    <title>My Phone Book</title>

    <!-- Bootstrap icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">

</head>
<!-- Head ends -->

<!-- Body starts -->
<body class="bg-light">

    <div class="container mt-4">
        <h1 class="text-center text-success display-4 fw-bolder">My Phone Book</h1>
        <p class="text-center fw-bold">Organize, search, and manage your contacts effortlessly!</p>
        
        <!-- Div to display success messages -->
        <div id="messageBox" class="alert d-none" role="alert"></div>

        <div class="row mt-4">

            <!-- Left column for adding new contacts -->
            <div class="col-md-5">
                <div class="card p-4 shadow-sm">
                    <h2 class="mb-3">Add New Contact</h2>
                    <p class="text-muted">Wow, contact family is growing!</p>
                    <form id="contactForm">

                        <!-- Name -->
                        <label class="form-label">
                            Name <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="name" class="form-control mb-1" placeholder="Enter your name" required>
                        <!-- Error message of name field -->
                        <small id="nameError" class="text-danger d-block"></small>

                        <!-- Phone number -->
                        <label class="form-label mt-3">
                            Phone Number <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="phone" class="form-control mb-1" placeholder="Enter your mobile number" required>
                        <!-- Error message of phone number field -->
                        <small id="phoneError" class="text-danger d-block"></small>

                        <!-- Add button -->
                        <button type="submit" class="btn btn-primary mt-3 w-100">
                            Add Contact
                        </button>

                    </form>
                </div>
            </div>

            <!-- Right column for search and display contacts -->
            <div class="col-md-7">

                <!-- Search box -->
                <div class="card p-3 shadow-sm mb-3">
                    <h2>Search Your Contacts</h2>
                    <p class="text-muted">Want to connect someone?</p>
                    <input type="text" id="search" class="form-control" placeholder="Enter name or mobile number">
                </div>

                <!-- Display contacts list -->
                <div class="card p-3 shadow-sm mb-5">
                    <h2>Your Contact List</h2>
                    <p class="text-muted">Connections at your fingertips!</p>
                    <ul id="contactList" class="list-unstyled mt-2"></ul>
                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Link external JavaScript -->
    <script src="js/scripts.js"></script>
    
</body>
<!-- Body ends -->

</html>
